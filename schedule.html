<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <base href="/karttrack/" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Race Schedule - East Lansing Kart Track</title>
    <!-- Main site styles and calendar-specific styles -->
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/calendar.css" />
  </head>
  <body>
    <!-- Header with Banner, Navigation -->
    <header class="site-header">
      <img
        src="images/top_logo.gif"
        alt="East Lansing Kart Track Banner"
        class="header-banner"
      />
      <nav class="navbar">
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li class="dropdown">
            <a href="#">Races</a>
            <ul class="dropdown-menu">
              <li><a href="schedule.html">Schedule</a></li>
              <li><a href="results.html">Results</a></li>
            </ul>
          </li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </header>

    <!-- Main Calendar Section -->
    <main>
      <section class="races-schedule">
        <h1>Race Schedule</h1>
        <!-- Calendar Navigation Header -->
        <section class="calendar-header">
          <button id="prev-month">Previous</button>
          <h2 id="calendar-month-year"></h2>
          <button id="next-month">Next</button>
        </section>
        <!-- The calendar container -->
        <div id="simple-calendar"></div>
      </section>
    </main>

    <!-- Footer Section with Sponsors -->
    <footer>
      <div class="sponsors">
        <h2>Thank you to our Sponsors</h2>
        <div class="sponsor-links">
          <a href="http://www.northsidetowing.net/" target="_blank">
            <img src="images/northside.png" alt="Northside Towing" />
          </a>
          <a
            href="http://www.rockauto.com/index.php?a=Speedway"
            target="_blank"
          >
            <img src="images/rockauto.png" alt="Rock Auto" />
          </a>
          <a href="http://www.spartanspeedway.com/" target="_blank">
            <img src="images/spartanspeedway.gif" alt="Spartan Speedway" />
          </a>
          <!-- You can add more sponsors here -->
        </div>
        <p>
          For more information on becoming a sponsor, email
          <a href="mailto:info@KartTrack.com">info@KartTrack.com</a>
        </p>
      </div>
      <p>&copy; 2025 East Lansing Kart Track. All rights reserved.</p>
    </footer>

    <!-- External JavaScript file for calendar navigation -->
    <script src="js/calendar-simple.js"></script>
  </body>
</html>
