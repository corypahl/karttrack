<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Race Schedule - East Lansing Kart Track</title>
    <!-- Use absolute path so that the CSS file loads correctly from GitHub Pages -->
    <link rel="stylesheet" href="/karttrack/css/styles.css" />
    <!-- FullCalendar CSS from CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/main.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Header with Banner, Navigation -->
    <header class="site-header">
      <img
        src="images/top_logo.gif"
        alt="East Lansing Kart Track Banner"
        class="header-banner"
      />

      <nav class="navbar">
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li class="dropdown">
            <a href="#">Races</a>
            <ul class="dropdown-menu">
              <li><a href="schedule.html">Schedule</a></li>
              <li><a href="results.html">Results</a></li>
            </ul>
          </li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </header>

    <!-- Race Schedule Section -->
    <main>
      <section class="schedule">
        <h1>Race Schedule</h1>
        <!-- Calendar container -->
        <div id="calendar"></div>
      </section>
    </main>

    <!-- Footer Section with Sponsors -->
    <footer>
      <div class="sponsors">
        <h2>Thank you to our Sponsors</h2>
        <div class="sponsor-links">
          <a href="http://www.northsidetowing.net/" target="_blank">
            <img src="images/northside.gif" alt="Northside Towing" />
          </a>
          <a
            href="http://www.rockauto.com/index.php?a=Speedway"
            target="_blank"
          >
            <img src="images/rockauto.gif" alt="Rock Auto" />
          </a>
          <a href="http://www.spartanspeedway.com/" target="_blank">
            <img src="images/spartanspeedway.gif" alt="Spartan Speedway" />
          </a>
          <!-- You can add more sponsors here -->
        </div>
        <p>
          For more information on becoming a sponsor, email
          <a href="mailto:info@KartTrack.com">info@KartTrack.com</a>
        </p>
      </div>
      <p>&copy; 2025 East Lansing Kart Track. All rights reserved.</p>
    </footer>

    <!-- FullCalendar JS from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/main.min.js"></script>
    <!-- Custom calendar initialization script -->
    <script src="/karttrack/js/calendar-schedule.js"></script>
    <script src="/karttrack/js/scripts.js"></script>
  </body>
</html>
